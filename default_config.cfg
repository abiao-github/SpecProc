# Flat fielding (STEP 2)
[reduce.flat]
# Flat combination method
combine_method = median

# Quality threshold for flat response
q_threshold = 0.5

# Maximum count for mosaic operation
mosaic_maxcount = 65535.0

# Sparse-knots B-spline blaze fitting (PypeIt-style):
# Interior knot spacing (pixels). Wider = more rigid (better fringe rejection).
# Must exceed the horizontal fringe period (typically >200 px).
# Recommended 400-600 for 4k detectors.
blaze_knot_spacing = 500
# Number of extra dense knots at each edge for tracking steep blaze roll-off.
# 4-8 recommended.
blaze_edge_nknots = 6

# Window size for per-column width smoothing W_smooth(X)
width_smooth_window = 41

# Number of segments along X for cross-dispersion profile (>=1; more segments
# track PSF shape changes better). 100 recommended for 4k detectors.
n_profile_segments = 100

# Gaussian sigma (in segment units) for smoothing profiles along X.
# Ensures cross-dispersion profiles vary continuously. 0 = no smooth.
profile_smooth_sigma = 6.0

# Binning step on normalized coordinate y_norm for universal profile
profile_bin_step = 0.01

# Pixel-flat cleaning range inside apertures (outside range -> set to 1.0)
pixel_flat_min = 0.5
pixel_flat_max = 1.5

# Background subtraction (STEP 3)
[reduce.background]
# Background estimation method: convolution, column_spline, chebyshev, bspline, or gaussian_smooth
# 'convolution' uses astropy NaN-aware 2D Gaussian convolution (recommended for
# reproducing local structures like ripples/fringes); 'column_spline' fits a
# smoothing spline per column through inter-order pixels then lightly smooths
# horizontally; 'chebyshev' fits a global 2D Chebyshev polynomial; 'bspline'
# uses bivariate spline; 'gaussian_smooth' uses iterative Gaussian smoothing with
# valid-pixel weighting (NaN-aware numerator/denominator, σ = smooth_sigma).
method = convolution

# 2D fit order (for chebyshev/bspline)
poly_order = 3

# Gaussian sigma for gaussian_smooth method
smooth_sigma = 20.0

# Gaussian kernel sigma for convolution method (pixels)
# 建议: kernel_sigma_x = 13.0 (极细核，完美刻画横向条纹波动), kernel_sigma_y = 13.0 (刚好跨越 10-12px mask 并保留纵向高频结构)
kernel_sigma_x = 13.0
kernel_sigma_y = 13.0

# Column-wise 1D spline parameters (for column_spline method)
# spline_smooth_factor: multiplier on N_bg_pixels to set spline smoothing s.
# Smaller values → more flexible spline that follows ripple peaks/troughs.
spline_smooth_factor = 1.0
# spline_post_smooth_x: Gaussian σ (px) for light horizontal smoothing after
# assembling per-column backgrounds. Removes column-to-column discontinuities.
spline_post_smooth_x = 5.0

# Sigma clipping threshold for robust fit sampling
sigma_clip = 3.0

# Maximum sigma clipping iterations
sigma_clip_maxiters = 4

# Pixel margin outside traced order edges to mask PSF wings
mask_margin_pixels = 1

# B-spline smoothing factor scale (larger = smoother)
bspline_smooth = 1.0

# Sigma-clipping mode: both (symmetric), upper (reject bright outliers only,
# recommended for flats with unmasked faint orders), or lower.
sigma_clip_mode = upper

