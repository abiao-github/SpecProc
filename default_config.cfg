# SpecProc Default Configuration
# This file contains default parameters for echelle spectrograph data reduction
#
# To customize, create a specproc.cfg file in the working directory
# Values in specproc.cfg will override these defaults

# ============================================================================
# DATA & INSTRUMENTS CONFIGURATION
# ============================================================================
[data]
# Raw FITS data directory path
# Note: These are default values. Users should create specproc.cfg in their working directory
# to override these paths for their specific projects.
#
# Path behavior:
# - rawdata_path = /data/20241102_hrs       → Absolute path, loads from /data/20241102_hrs/
# - rawdata_path = ./20241102_hrs           → Relative path, loads from working_directory/20241102_hrs/
# - rawdata_path = 20241102_hrs             → Same as above, also relative to working directory
#   (e.g., if working in /myworkspace/, loads from /myworkspace/20241102_hrs/)
#
# Examples (assuming working directory is /myworkspace/):
#   rawdata_path = ./20241102_hrs      → Data from /myworkspace/20241102_hrs/
#   rawdata_path = 20241102_hrs        → Same as above, data from /myworkspace/20241102_hrs/
#   rawdata_path = /data/20241102_hrs  → Data from /data/20241102_hrs/
rawdata_path = ./rawdata

# FITS header keywords
statime_key = DATE-OBS
exptime_key = EXPTIME

# Image dispersion direction
# Options: xr- (x positive is dispersion), xl- (x negative is dispersion)
direction = xr-

[reduce]
# Output directory path for all processing results
# Note: These are default values. Users should create specproc.cfg in their working directory
# to override these paths for their specific projects.
#
# Path behavior:
# - output_path = /data/output      → Absolute path, saves to /data/output/
# - output_path = ./output          → Relative path, saves to working_directory/output/
# - output_path = output            → Same as above, also relative to working directory
#   (e.g., if working in /myworkspace/, saves to /myworkspace/output/)
#
# Examples (assuming working directory is /myworkspace/):
#   output_path = ./output          → Results to /myworkspace/output/
#   output_path = output            → Same as above, results to /myworkspace/output/
#   output_path = /data/output      → Results to /data/output/
output_path = output

[telescope]
# Telescope name for calibration lookup
# This is looked up in: calib_data/telescopes/<name>/
# Example: xinglong216hrs (Xinglong 2.16m telescope)
# For user telescope: Create custom directory under calib_data/telescopes/
name = xinglong216hrs

# Spectrograph instrument name (used for calibration file lookup)
# Calibration files are located in: calib_data/telescopes/<telescope_name>/
# Example: hrs (High Resolution Spectrograph)
# File naming: <instrument>_wlcalib_<YYYYMMDDHH>_<suffix>.fits
instrument = hrs

[telescope.detector]
# Detector parameters
# Note: nrows and ncols are automatically detected from FITS files
# CCD gain
gain = 1.0

# Read noise
readnoise = 5.0

# ============================================================================
# DATA REDUCTION CONFIGURATION
# ============================================================================

# Overscan correction
[data]
# Overscan region configuration (simplified)
# Only overscan_start_column needed (1-based, from right edge)
# For 4160x4136 images: data columns 1-4096, overscan columns 4097-4160
# Set to -1 to disable overscan correction
overscan_start_column = -1

# Overscan correction method: mean_only, mean_savgol, or mean_polynomial
# - mean_only: Sigma-clipped mean only, no smoothing
# - mean_savgol: Sigma-clipped mean with Savitzky-Golay smoothing
# - mean_polynomial: Sigma-clipped mean with polynomial fitting (IRAF style)
overscan_method = mean_only

# Overscan Savitzky-Golay smoothing window (in pixels, default is 1/5 of image height)
# Set to -1 for automatic (1/5 of image height)
overscan_smooth_window = -1

# Overscan polynomial fitting parameters (for mean_polynomial method)
# Polynomial type: legendre, chebyshev, or polynomial
overscan_poly_type = legendre
# Polynomial order (degree)
overscan_poly_order = 3

# Optional crop bounds after overscan subtraction/trimming (DS9 indexing, 1-based, inclusive)
# Set any value < 1 to disable manual crop (default: disabled)
trim_x_start = -1
trim_x_end = -1
trim_y_start = -1
trim_y_end = -1

# Bias correction (STEP 1)
[reduce.bias]
# Image combination method: mean, median, or sigma_clip
combine_method = median

# Sigma clipping threshold
combine_sigma = 3.0

# Flat fielding (STEP 2)
[reduce.flat]
# Flat combination method
combine_method = median

# Quality threshold for flat response
q_threshold = 0.5

# Maximum count for mosaic operation
mosaic_maxcount = 65535.0

# 1D blaze smoothing method: median, savgol, or bspline
blaze_smooth_method = savgol

# Window size for median/savgol blaze smoothing
blaze_smooth_window = 21

# Smoothing factor scale for bspline blaze smoothing
blaze_bspline_smooth = 0.5

# Window size for per-column width smoothing W_smooth(X)
width_smooth_window = 41

# Binning step on normalized coordinate y_norm for universal profile
profile_bin_step = 0.01

# Pixel-flat cleaning range inside apertures (outside range -> set to 1.0)
pixel_flat_min = 0.5
pixel_flat_max = 1.5

# Background subtraction (STEP 3)
[reduce.background]
# Background estimation method: chebyshev, bspline, or smooth
method = chebyshev

# 2D fit order (for chebyshev/bspline)
poly_order = 3

# Gaussian sigma for smooth method
smooth_sigma = 20.0

# Sigma clipping threshold for robust fit sampling
sigma_clip = 3.0

# Maximum sigma clipping iterations
sigma_clip_maxiters = 4

# Pixel margin outside traced order edges to mask PSF wings
mask_margin_pixels = 3

# B-spline smoothing factor scale (larger = smoother)
bspline_smooth = 1.0

# Cosmic ray correction (STEP 4)
[reduce]
# Cosmic ray correction parameters
cosmic_enabled = yes
cosmic_sigma = 5.0
cosmic_window = 5
# Fine-structure PSF test threshold (cross-dispersion neighbours).
# Raise toward 3.0 for denser PSFs; lower toward 1.5 for sparser ones.
cosmic_fine_sigma = 2.0
# Along-dispersion continuity threshold; protects real spectral lines/orders.
cosmic_line_sigma = 1.5
# Lower threshold used to grow compact cosmic-ray seeds to adjacent hit pixels.
cosmic_grow_sigma = 2.5
# Maximum compact connected-component size kept as a cosmic-ray cluster.
cosmic_maxsize = 8

# ============================================================================
# TRACE & EXTRACTION CONFIGURATION
# ============================================================================

# Order tracing
[reduce.trace]
# Order detection scan step
scan_step = 10

# Minimum detection strength
minimum = 50.0

# Expected order separation (pixels)
separation = 30.0

# Seed detection threshold on center profile (fraction of max, 0-1)
seed_threshold = 0.30

# Scale factor for peak prominence threshold
prominence_scale = 0.50

# Local search half-window scale relative to separation
search_half_scale = 0.45

# Column step denominator for bidirectional tracing (larger=denser sampling)
step_denominator = 220

# Whether to fill weak missing orders by gap-based seed interpolation
fill_missing_orders = yes

# Gap factor to trigger missing-order insertion
gap_fill_factor = 1.6

# Global fit/smoothing method for center and edge-offset curves: polynomial, chebyshev, bspline
fit_method = polynomial

# Smoothing factor scale for bspline center fit
bspline_smooth = 0.2

# Independent edge fit polynomial degree (Sobel edge points)
edge_degree = 3

# Apertures diagnostic boundary = max(frac * peak_excess, noise_floor_sigma * sigma_bg)
# Fraction of peak excess (peak - background envelope)
aperture_root_fraction = 0.03

# Noise-floor multiplier for robust sigma estimated in inter-order regions
aperture_noise_floor_sigma = 3.0

# Filling factor threshold
filling = 0.3

# Polynomial degree for aperture traces
degree = 3

# Spectrum extraction
[reduce.extract]
# Extraction method: sum or optimal
method = sum

# Lower extraction limit relative to aperture center (pixels)
lower_limit = -5.0

# Upper extraction limit relative to aperture center (pixels)
upper_limit = 5.0

# ============================================================================
# WAVELENGTH CALIBRATION CONFIGURATION
# ============================================================================

# Calibration lamp and files
[telescope.linelist]
# Recommended lamp type: ThAr, Ar, Ne, He, Fe
# or use 'custom' to specify custom linelist file
linelist_type = ThAr

# Path to linelist files (relative to SpecProc root)
linelist_path = calib_data/linelists/

# Specific linelist file (optional - if not specified, auto-search by type)
# For Xinglong 2.16m HRS: use thar-noao.dat (ThAr lamp)
linelist_file = thar-noao.dat

# Alternative linelist options (commented):
# linelist_file = thar.dat           # Standard ThAr lines
# linelist_file = FeAr.dat           # FeAr lamp lines

# Use pre-identified calibration files (optional)
# If enabled, load existing wavelength calibration instead of fitting
use_precomputed_calibration = no

# Path to pre-identified calibration files (relative to SpecProc root)
calibration_path = calib_data/telescopes/xinglong216hrs/

# Specific calibration file to use (optional - if not specified, use latest)
# Example: wlcalib_20211123011_A.fits (calibration from 2021-11-23 01:00)
calibration_file = wlcalib_20211123011_A.fits

# Available calibration files (for reference):
# wlcalib_20141103049.fits - 2014-11-03 04:50
# wlcalib_20171202012.fits - 2017-12-02 01:20
# wlcalib_20190905028_A.fits - 2019-09-05 02:50 (version A)
# wlcalib_20211123011_A.fits - 2021-11-23 01:10 (version A)

[reduce.wlcalib]
# Main calibration parameters
# Search calibration database for previous calibrations
search_database = yes

# Use previously fitted parameters as initial guess
use_prev_fitpar = yes

# Polynomial order for wavelength solution
# xorder: order in dispersion direction
# yorder: order in spatial direction (across orders)
xorder = 4
yorder = 4

# RMS quality threshold (Angstrom)
rms_threshold = 0.1

# Advanced parameters
# Time window for calibration grouping (seconds)
time_diff = 600

# Auto-select calibration reference
auto_selection = yes

# Window size for line fitting
window_size = 10

# Sigma clipping threshold for line fitting
clipping = 3.0

# Minimum line intensity threshold
q_threshold = 0.5

# ============================================================================
# PROCESSING & OUTPUT CONFIGURATION
# ============================================================================

[reduce]
# Processing mode: normal or debug
mode = normal

# Output figure format: png, pdf, jpg
fig_format = png

# Output filename suffix
oned_suffix = _ods

# Auto process all science images without confirmation dialog
auto_process_all_images = yes

# Output directory structure:
# output/
#   ├── step0_overscan/         # Step 0: Overscan-corrected images and diagnostic plots
#   ├── step1_bias/             # Step 1: Master bias frame and diagnostic plots
#   ├── step2_flat/             # Step 2: Master flat field, blaze profiles, and diagnostic plots
#   ├── step3_background/       # Step 3: Background model and diagnostic plots
#   ├── step4_cosmic/           # Step 4: Cosmic ray corrected images and diagnostic plots (if enabled)
#   ├── step5_extraction/       # Step 5: Extracted 1D spectra and diagnostic plots
#   ├── step6_wavelength/       # Step 6: Wavelength calibration solution and diagnostic plots
#   ├── step7_deblazing/        # Step 7: De-blazed spectra and diagnostic plots (if saved)
#   └── step8_final_spectra/    # Step 8: Final 1D spectra for science frames

[reduce.save_intermediate]
# Whether to save intermediate results for each step
# Set to 'yes' or 'no' for each step independently
# Default is 'yes' for all steps
save_overscan = yes        # Step 0: Overscan correction (saves to output/step0_overscan/)
save_bias = yes             # Step 1: Bias correction (saves master bias to output/step1_bias/)
save_flat = yes              # Step 2: Flat fielding (saves master flat to output/step2_flat/)
save_background = yes        # Step 3: Background subtraction (saves model to output/step3_background/)
save_cosmic = yes           # Step 4: Cosmic ray correction (saves corrected images to output/step4_cosmic/)
save_extraction = yes       # Step 5: Spectrum extraction (saves to output/step5_extraction/)
save_wlcalib = yes          # Step 6: Wavelength calibration (saves solution to output/step6_wavelength/)
save_deblaze = yes          # Step 7: De-blazing (saves to output/step7_deblazing/)

[reduce]
# Plotting options
# Whether to save diagnostic plots for each step
# Set to 'yes' or 'no'
# Default is 'yes'
save_plots = yes
