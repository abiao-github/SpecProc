[reduce]
# Cosmic ray correction parameters
cosmic_enabled = yes
cosmic_sigma = 5.0
cosmic_window = 5
# Fine-structure PSF test threshold (cross-dispersion neighbours).
# Raise toward 3.0 for denser PSFs; lower toward 1.5 for sparser ones.
cosmic_fine_sigma = 2.0
# Along-dispersion continuity threshold; protects real spectral lines/orders.
cosmic_line_sigma = 1.5
# Lower threshold used to grow compact cosmic-ray seeds to adjacent hit pixels.
cosmic_grow_sigma = 2.5
# Maximum compact connected-component size kept as a cosmic-ray cluster.
cosmic_maxsize = 8

